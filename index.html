<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wooper Fan Club</title>

<style>

body{
font-family:Arial;
margin:0;
text-align:center;
background:linear-gradient(#6dd5ff,#baf3ff);
}

header{
background:#54c9ff;
padding:25px;
font-size:32px;
font-weight:bold;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:200px;
margin:20px auto;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#6dd5ff;
cursor:pointer;
}

.hpbar{
background:#ddd;
width:120px;
height:10px;
margin:auto;
border-radius:6px;
}

.hp{
background:#4CAF50;
height:10px;
width:100%;
border-radius:6px;
}

#wooperSwim{
position:fixed;
bottom:60px;
left:-100px;
width:70px;
}

</style>
</head>

<body>

<header>🐸 WOOPER FAN CLUB 🐸</header>

<h2>Daily Pokémon Battle</h2>

<div class="card">
<h3 id="name1"></h3>

<div class="hpbar">
<div id="hp1" class="hp"></div>
</div>

<img id="img1" width="120">

<br><br>

<button onclick="attack()">Attack</button>

</div>

<div class="card">
<h3 id="name2"></h3>

<div class="hpbar">
<div id="hp2" class="hp"></div>
</div>

<img id="img2" width="120">

</div>

<p id="log"></p>

<img id="wooperSwim"
src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/194.png">

<script>

let hpA=100
let hpB=100

let p1
let p2

function randomPokemon(){
return Math.floor(Math.random()*151)+1
}

function loadPokemon(){

p1=randomPokemon()
p2=randomPokemon()

fetch("https://pokeapi.co/api/v2/pokemon/"+p1)
.then(r=>r.json())
.then(d=>{
document.getElementById("name1").innerText=d.name
document.getElementById("img1").src=d.sprites.front_default
})

fetch("https://pokeapi.co/api/v2/pokemon/"+p2)
.then(r=>r.json())
.then(d=>{
document.getElementById("name2").innerText=d.name
document.getElementById("img2").src=d.sprites.front_default
})

}

function attack(){

let dmg=Math.floor(Math.random()*20)+5

hpB-=dmg
if(hpB<0)hpB=0

document.getElementById("hp2").style.width=hpB+"%"

document.getElementById("log").innerText=
document.getElementById("name1").innerText+" attacks for "+dmg

}

loadPokemon()

let pos=-100

function swim(){

pos+=2

document.getElementById("wooperSwim").style.left=pos+"px"

if(pos>window.innerWidth){
pos=-100
}

requestAnimationFrame(swim)

}

swim()

</script>

</body>
</html>
